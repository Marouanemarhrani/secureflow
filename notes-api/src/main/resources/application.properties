spring.application.name=notes-api
# Actuator — expose health, prometheus, info endpoints only
management.endpoints.web.exposure.include=health,info,prometheus
# Use /actuator prefix (default)
management.endpoints.web.base-path=/actuator
# Add app/pod labels to every metric
management.metrics.tags.application=notes-api
# Include JVM, process, logback, HTTP, and Tomcat metrics
management.metrics.distribution.percentiles-histogram.http.server.requests=true
