spring.application.name=notes-api

# -----------------------------------------------------------------------------
# Datasource — PostgreSQL in production, overridden per-profile
# -----------------------------------------------------------------------------
# These defaults are suitable for running against a local Postgres.
# In Kubernetes, these get overridden by SPRING_DATASOURCE_* env vars from Secret.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notes}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notes}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# -----------------------------------------------------------------------------
# Actuator — expose health, prometheus, info endpoints only
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator
management.metrics.tags.application=notes-api
management.metrics.distribution.percentiles-histogram.http.server.requests=true
