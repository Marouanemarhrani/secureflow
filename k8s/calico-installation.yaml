# k8s/calico-installation.yaml
#
# Calico CNI installation spec for our kind cluster.
#
# CIDR must match podSubnet in kind-cluster.yaml (10.244.0.0/16).
# encapsulation: VXLANCrossSubnet — works reliably inside Docker (kind)
# without needing IP-in-IP, which some Docker network drivers block.

apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  calicoNetwork:
    ipPools:
      - blockSize: 26
        cidr: 10.244.0.0/16
        encapsulation: VXLANCrossSubnet
        natOutgoing: Enabled
        nodeSelector: all()
---
apiVersion: operator.tigera.io/v1
kind: APIServer
metadata:
  name: default
spec: {}