apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: secureflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: secureflow-platform
type: Opaque
stringData:
  # NOTE: These are DEMO credentials. In real production, manage secrets via
  # Sealed Secrets, External Secrets Operator, or HashiCorp Vault — NEVER commit
  # plaintext to git. See docs/findings.md for details.
  POSTGRES_USER: notes
  POSTGRES_PASSWORD: "notes-demo-password-change-me"
  POSTGRES_DB: notes
  # Connection URL used by notes-api
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/notes"
  SPRING_DATASOURCE_USERNAME: notes
  SPRING_DATASOURCE_PASSWORD: "notes-demo-password-change-me"
