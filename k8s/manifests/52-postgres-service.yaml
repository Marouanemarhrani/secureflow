apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: secureflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: secureflow-platform
spec:
  # Headless service (clusterIP: None) gives stable DNS per-pod for StatefulSet
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres
