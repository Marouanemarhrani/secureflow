# .github/workflows/security-pipeline.yml
#
# SecureFlow security pipeline.
# Runs on every push and pull request to main.
# Each "gate" runs as a separate job so failures are isolated and visible.

name: security-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------------------------------------
  # Gate 1 — Secret scanning with Gitleaks
  # Catches: hardcoded API keys, tokens, passwords across the entire history
  # ----------------------------------------------------------------------
  gitleaks:
    name: "Gate 1 — Gitleaks (secrets)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------------
  # Gate 2 — Static Application Security Testing (SAST) with Semgrep
  # Catches: code-level vulnerabilities like SQL injection, XSS,
  # command injection, weak crypto, unsafe deserialization, etc.
  # Ruleset: OWASP Top 10 — industry-standard baseline.
  # ----------------------------------------------------------------------
  semgrep:
    name: "Gate 2 — Semgrep (SAST)"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep --config=p/owasp-top-ten --error --severity=ERROR

  # ----------------------------------------------------------------------
  # Gate 3 — Dependency scanning with Trivy (filesystem mode)
  # Catches: known CVEs in libraries declared in pom.xml (direct + transitive).
  # We fail on HIGH and CRITICAL findings only.
  # CVEs in .trivyignore are intentionally skipped with documented justification.
  # ----------------------------------------------------------------------
  trivy-fs:
    name: "Gate 3 — Trivy (dependencies)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: notes-api
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table
          trivyignores: .trivyignore

  # ----------------------------------------------------------------------
  # Gate 4 — Infrastructure-as-Code scanning with Checkov (Dockerfile)
  # Catches: Dockerfile misconfigurations — missing HEALTHCHECK, running
  # as root, unpinned image tags, exposed docker socket, etc.
  # Focus: notes-api/Dockerfile. K8s manifests are scanned separately in Gate 7.
  # ----------------------------------------------------------------------
  checkov:
    name: "Gate 4 — Checkov (Dockerfile)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov on Dockerfile
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: notes-api
          framework: dockerfile
          quiet: true
          soft_fail: false

  # ----------------------------------------------------------------------
  # Gate 5 — Container image scanning with Trivy (image mode)
  # Catches: CVEs in the JRE and OS packages baked into the Docker image.
  # Complements Gate 3 (pom.xml deps) — this one sees the full runtime stack.
  # Reuses the same .trivyignore to stay consistent with dependency exceptions.
  # ----------------------------------------------------------------------
  trivy-image:
    name: "Gate 5 — Trivy (container image)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t secureflow/notes-api:ci ./notes-api

      - name: Scan the built image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: secureflow/notes-api:ci
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table
          trivyignores: .trivyignore

  # ----------------------------------------------------------------------
  # Gate 6 — Dynamic Application Security Testing (DAST) with OWASP ZAP
  # Catches: runtime issues you can't see in static analysis —
  # missing security headers, verbose errors, CORS misconfig, info leaks.
  # Runs the actual built container and attacks it over HTTP.
  # Baseline mode = passive scan only (safe for CI, ~2 min).
  # ----------------------------------------------------------------------
  zap-baseline:
    name: "Gate 6 — OWASP ZAP (DAST)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build the Docker image
        run: docker build -t secureflow/notes-api:ci ./notes-api

      - name: Start the app container
        run: |
          docker run -d --name notes-api -p 8080:8080 secureflow/notes-api:ci
          echo "Waiting for app to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/notes > /dev/null; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start within 30s"
          docker logs notes-api
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080/notes'
          cmd_options: '-a'
          fail_action: false
          allow_issue_writing: false

      - name: Stop the app container
        if: always()
        run: |
          docker logs notes-api || true
          docker stop notes-api || true
          docker rm notes-api || true

  # ----------------------------------------------------------------------
  # Gate 7 — Kubernetes manifest scanning with Checkov
  # Catches: pod running as root, missing securityContext, missing resource
  # limits, hostPath mounts, default namespace usage, missing probes, etc.
  # Runs the same Checkov version as Gate 4, but with the kubernetes
  # framework and our central .checkov.yaml skip configuration.
  # ----------------------------------------------------------------------
  checkov-k8s:
    name: "Gate 7 — Checkov (K8s manifests)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/manifests
          framework: kubernetes
          config_file: .checkov.yaml
          quiet: true
          soft_fail: false