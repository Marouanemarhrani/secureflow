# .github/workflows/security-pipeline.yml
#
# SecureFlow security pipeline.
# Runs on every push and pull request to main.
# Each "gate" runs as a separate job so failures are isolated and visible.

name: security-pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------------------------------------
  # Gate 1 — Secret scanning with Gitleaks
  # Catches: hardcoded API keys, tokens, passwords across the entire history
  # ----------------------------------------------------------------------
  gitleaks:
    name: "Gate 1 — Gitleaks (secrets)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ----------------------------------------------------------------------
  # Gate 2 — Static Application Security Testing (SAST) with Semgrep
  # Catches: code-level vulnerabilities like SQL injection, XSS, command
  # injection, weak crypto, unsafe deserialization, etc.
  # Ruleset: OWASP Top 10 — industry-standard baseline.
  # ----------------------------------------------------------------------
  semgrep:
    name: "Gate 2 — Semgrep (SAST)"
    runs-on: ubuntu-latest
    # Official Semgrep container — the tool is pre-installed, faster than pip install
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        # --config = which ruleset to use
        # --error  = exit non-zero if findings are found (fails the job)
        # --severity ERROR = only fail on high-severity findings (medium/low become warnings)
        run: semgrep --config=p/owasp-top-ten --error --severity=ERROR